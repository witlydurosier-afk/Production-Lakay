[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/api/*"
  to = "https://production-lakay-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://production-lakay-backend.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "https://production-lakay-backend.onrender.com/admin"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://production-lakay-backend.onrender.com/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
